name: PR Validation

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gbn-udp
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compilar
        run: mvn -B clean compile

      - name: Rodar testes
        run: mvn -B test

      - name: Resumo de cobertura no PR
        if: always()
        run: |
          if [ -f target/site/jacoco/index.html ]; then
            echo "Relatório de cobertura gerado em target/site/jacoco/index.html" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Publicar relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report-pr
          path: gbn-udp/target/site/jacoco/

      - name: Verificar que o jar é gerado
        run: mvn -B package -DskipTests
